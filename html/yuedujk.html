    <script>
        function copyLink(btn) {
            const link = btn.closest('tr').querySelector('.link-text').dataset.link;
            navigator.clipboard.writeText(link)
                .then(() => {
                    btn.classList.add('copied');
                    btn.textContent = '已复制!';
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.textContent = '立即复制';
                    }, 2000);
                })
                .catch(err => {
                    btn.textContent = '复制失败';
                    setTimeout(() => {
                        btn.textContent = '立即复制';
                    }, 1500);
                });
        }
