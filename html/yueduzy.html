<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说资源 - 指尖看世界</title>
	<link rel="shortcut icon" type="image/png" href="../assets/images/favicon.png">	
    <!-- Bootstrap 核心样式 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin-top: 30px;
        }
        .header-title {
            color: #2c3e50;
            margin: 20px 0;
            font-weight: 500;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
        }
        .online { background: #e8f5e9; color: #2e7d32; }
        .offline { background: #ffebee; color: #c62828; }
        /* 新增介绍模块样式 */
        .intro-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .table td, .table th { padding: 0.75rem; font-size: 14px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="header-title">📚 小说资源收集</h1>
        
        <!-- 新增介绍模块 -->
        <div class="intro-box">
            <h5>网站说明</h5>
            <p class="mb-0">本站专注收录优质小说资源。所有资源经过人工审核，每日自动更新状态检测，为您提供最新可用资源导航服务。</p>
        </div>

        <!-- 动态统计信息 -->
        <div class="alert alert-light">
            <small>数据更新时间：<span id="updateDate"></span> | 共收录 <span id="siteCount"></span> 个站点</small>
        </div>

        <table class="table table-hover table-bordered">
            <thead class="thead-light">
                <tr>
                    <th style="width:20%">名称</th>
                    <th>访问地址</th>
                    <th style="width:15%">状态</th>
                </tr>
            </thead>
            <tbody id="linkList"></tbody>
        </table>
        
        <footer class="text-center text-secondary py-4">
            <small>© 2025 指尖看世界 | 数据仅供参考，访问请遵守当地法律</small>
        </footer>
    </div>

    <!-- JavaScript 动态加载 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        // 数据源（可替换为你的数据）
        const resourceList = [
            { name: "大灰狼书源发布页", url: "https://dashabi.tk/", status: 1 },
            { name: "晴天书源发布页", url: "http://www.qingtian618.cn/", status: 1 },
            { name: "书山接口发布页", url: "http://fb.shushan.vip:9999/", status: 1 },
            { name: "源仓库发布页", url: "https://link3.cc/yckceo", status: 1 },
			{ name: "Yioe书源合集", url: "https://shuyuan.yiove.com/normal", status: 1 },
			{ name: "免费小说网站", url: "https://bhapp.top/XS/", status: 1 },
            // 更多数据...
        ];

        // 日期格式化函数 
        function formatDate(date) {
            const pad = n => n < 10 ? '0' + n : n;
            return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
        }

        // 生成表格函数
        function renderTable() {
            const tbody = $('#linkList');
            let html = '';
            
            resourceList.forEach(item => {
                html += `
                <tr>
                    <td>${item.name}</td>
                    <td><a href="${item.url}" target="_blank" class="text-dark">${shortenUrl(item.url)}</a></td>
                    <td>
                        <span class="status-badge ${item.status ? 'online' : 'offline'}">
                            ${item.status ? '正常访问' : '暂时失效'}
                        </span>
                    </td>
                </tr>`;
            });
            
            tbody.html(html);
            $('#siteCount').text(resourceList.length); // 动态更新数量
        }

        // 简化URL显示
        function shortenUrl(url) {
            return url.replace(/https?:\/\/(www\.)?/, '');
        }

        // 初始化页面 
        $(document).ready(function() {
            // 设置更新时间
            $('#updateDate').text(formatDate(new Date()));
            // 初始化表格
            renderTable();
            // 定时更新（每小时更新日期）
            setInterval(() => {
                $('#updateDate').text(formatDate(new Date()));
            }, 3600000);
        });
    </script>
</body>
</html>
